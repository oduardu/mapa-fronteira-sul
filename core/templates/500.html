<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Erro interno — Fronteira Sul em Resenha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --brand-primary: #ff0909;
            --brand-50: #FFF0F0;
            --brand-950: #220000;
            --fg-1: #0f172a;
            --fg-2: #475569;
            --accent-500: #F4B740;
        }
        html, body {
            margin: 0; padding: 0;
            font-family: 'Roboto', -apple-system, sans-serif;
            color: var(--fg-1);
            background: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }
        .shell { min-height: 100vh; display: flex; flex-direction: column; }
        header {
            background: var(--brand-primary);
            color: #fff;
            padding: 18px 24px;
        }
        header h1 {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 22px;
            font-weight: 700;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .codigo {
            font-family: Georgia, serif;
            font-size: 96px;
            font-weight: 700;
            color: var(--brand-primary);
            line-height: 1;
            margin: 0 0 8px;
            letter-spacing: -4px;
            opacity: 0.15;
        }
        .icone {
            margin: -40px auto 24px;
            width: 64px;
            height: 64px;
            background: var(--brand-50);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand-primary);
        }
        h2 {
            font-family: Georgia, serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--fg-1);
            margin: 0 0 12px;
        }
        p {
            font-size: 15px;
            color: var(--fg-2);
            line-height: 1.6;
            margin: 0 0 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            font-family: inherit;
            background: var(--brand-primary);
            color: #fff;
        }
        footer {
            background: var(--brand-950);
            color: rgba(255,255,255,0.7);
            padding: 14px 24px;
            border-top: 3px solid var(--accent-500);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <h1>Fronteira Sul em Resenha</h1>
        </header>

        <main>
            <div class="card">
                <div class="codigo">500</div>
                <div class="icone">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <h2>Erro interno no servidor</h2>
                <p>
                    Algo inesperado aconteceu do nosso lado.<br>
                    Tente novamente em instantes ou volte ao mapa.
                </p>
                <a href="/" class="btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Voltar ao mapa
                </a>
            </div>
        </main>

        <footer>
            FSR — Fronteira Sul em Resenha · Universidade Federal da Fronteira Sul (UFFS)
        </footer>
    </div>
</body>
</html>
